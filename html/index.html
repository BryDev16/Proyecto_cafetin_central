<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión- Coffee Main()</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="background">
        <!-- HEADER ARRIBA -->
        <header class="page-header">
            <h1 class="main-title">Coffee Main()</h1>
            <hr>
            <p class="main-subtitle">El cafetin central de la Facultad de Ciencias de la UCV.</p>
        </header>

        <!-- CONTENEDOR PRINCIPAL CON IMAGEN Y FORMULARIO -->
        <div class="main-container">
            <!-- IMAGEN A LA IZQUIERDA -->
            <div class="image-container">
                <img src="../css/imagenes/general/cafetin.jpg" alt="Imagen del cafetin" class="image">
            </div>

            <!-- FORMULARIO A LA DERECHA -->
            <div class="form-container" >
                <h2 class="form-title">Iniciar sesión</h2>
                
                <form action="#" method="post" id="loginForm">
                    <!-- CAMPO USUARIO-->
                    <div class="input-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" name="username" placeholder="Tu usuario" class="input-field">
                    </div>

                    <!-- CAMPO CONTRASEÑA -->
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" placeholder="Tu clave secreta" class="input-field">
                            <span class="emoji-eye" id="togglePassword">👁️</span>
                        </div>
                    </div>

                    <button type="submit" class="login-btn" class="btn-primary" id="loginBtn">Entrar</button>
                    
                    <div class="forgot-password">
                        <a href="#">¿Olvidaste tu contraseña?</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="footer">
            Coffee Main(). Cafetin Central. Hecho por y para estudiantes.
        </footer>
    </div>


<!--Parte funcional-->
<script>

//MINI BASE DE DATOS O ARREGLO PARA LOS UUSARIOS
    
// El rol ya viene vinculado al nombre, el usuario no lo elige
const baseDeDatosUsuarios = [
    { usuario: "ClienteUCV", password: "Central_123", rol: "cliente" },
    { usuario: "caja_01", password: "Cajero#123", rol: "caja" },
    { usuario: "adminRoot", password: "cafetinAdmin", rol: "admin" }
];

// 2. SELECCIÓN DEL FORMULARIO
// Usamos 'loginForm' para que coincida exactamente con el id de tu HTML
const loginForm = document.getElementById('loginForm');

// 3. EVENTO DE INICIO DE SESIÓN
loginForm.addEventListener('submit', function(e) {
    // EVITA EL ERROR 405: Detiene el envío automático al servidor
    e.preventDefault();

    // Captura de datos
    const nombreIngresado = document.getElementById("username").value;
    const passwordIngresado = document.getElementById("password").value;

    // Búsqueda del usuario
    const usuarioEncontrado = baseDeDatosUsuarios.find(u => u.usuario === nombreIngresado);

    if (usuarioEncontrado) {
        // Verificación de contraseña
        if (usuarioEncontrado.password === passwordIngresado) {
            alert("¡Bienvenido! Iniciando sesión como: " + usuarioEncontrado.rol);
            
            // Guardamos la sesión en LocalStorage para usarla en las otras páginas
            localStorage.setItem('usuario_activo', JSON.stringify(usuarioEncontrado));

            // REDIRECCIÓN DINÁMICA SEGÚN ROL
            // Convertimos a minúsculas para evitar errores de escritura
            const rol = usuarioEncontrado.rol.toLowerCase();

            if (rol === "admin") {
                window.location.href = "panel_admin.html";
            } 
            else if (rol === "caja" || rol === "cajero") {
                window.location.href = "caja.html";
            } 
            else if (rol === "cliente") {
                window.location.href = "menu.html";
            } 
            else {
                // Si el rol es desconocido, por defecto al menú
                window.location.href = "menu.html";
            }
            
        } else {
            alert("Contraseña incorrecta.");
        }
    } else {
        alert("El usuario no existe.");
    }
});

//OJITO PARA HUMILLAR A SIRCE

const passwordInput = document.getElementById("password");
const togglePassword = document.getElementById("togglePassword");

togglePassword.addEventListener("click", function (){

    if(passwordInput.type == "password"){

        passwordInput.type="text";
        togglePassword.innerText = "🤫"; //se cambia el emoji cuando esta oculto
    }else{
        passwordInput.type ="password";
        togglePassword.innerText = "👁️";//vuelve al ojo cuando ya no esta oculto jeje
    }
});

</script>
</body>


</html>
